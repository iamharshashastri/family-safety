name: Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: "--max_old_space_size=4096"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (electron)
        working-directory: ./electron
        run: |
          npm config set fund false
          npm config set audit false
          npm install --no-audit --no-fund

      - name: Build renderer (if present)
        working-directory: ./electron
        shell: pwsh
        run: |
          if (Test-Path src/renderer) {
            Push-Location src/renderer
            npm install --no-audit --no-fund
            npm run build || Write-Host "Renderer build step returned non-zero but continuing"
            Pop-Location
          } else {
            Write-Host "No renderer to build"
          }

      - name: Build Electron (NSIS)
        working-directory: ./electron
        run: |
          npm run build

      - name: Verify build artifacts
        shell: pwsh
        run: |
          if (-not (Test-Path electron/dist)) {
            Write-Error "No build artifacts found at electron/dist — build failed or produced no output."
            exit 1
          }
          $files = Get-ChildItem electron/dist -Recurse | Where-Object { $_.Extension -in '.exe', '.nsi', '.zip', '.7z' }
          if ($files.Count -eq 0) {
            Write-Error "No installer artifacts (.exe etc.) found in electron/dist."
            exit 1
          }
          Write-Host "Found build artifacts:"
          $files | ForEach-Object { Write-Host $_.FullName }

      - name: Upload installer artifact(s)
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron/dist/**
